<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista Visuals | Payment Portal</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --grid-color: rgba(255, 255, 255, 0.03);
            --primary-gradient: linear-gradient(135deg, #4a00e0 0%, #8e2de2 100%);
            --card-bg: rgba(20, 20, 35, 0.7);
            --text-main: #ffffff;
            --text-muted: #a0a0b5;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 550px;
            padding: 40px 20px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-container img {
            max-width: 200px;
            height: auto;
            border-radius: 8px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: transparent;
            border: none;
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 15px;
        }

        .tab.active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .section {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        label {
            display: block;
            margin-bottom: 12px;
            color: var(--text-muted);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* --- PILLS UI STYLING --- */
        .pills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            padding: 6px 16px 6px 6px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
            user-select: none;
        }

        .pill:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .pill.active {
            background: var(--primary-gradient);
            border-color: transparent;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(74, 0, 224, 0.4);
        }

        .icon-circle {
            width: 26px;
            height: 26px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
            font-size: 13px;
            font-weight: bold;
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        .pill.active .icon-circle {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* --- DETAILS BOX STYLING --- */
        .details-box {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 22px;
            position: relative;
            word-break: break-all;
        }

        .details-row {
            margin-bottom: 18px;
        }

        .details-row:last-child {
            margin-bottom: 0;
        }

        .details-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .details-value {
            font-size: 16px;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .copy-btn {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: var(--primary-gradient);
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: opacity 0.3s ease, transform 0.1s ease;
            box-shadow: 0 4px 15px rgba(74, 0, 224, 0.3);
        }

        .copy-btn:hover {
            opacity: 0.9;
        }

        .copy-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="/logo.png" alt="Vista Visuals">
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('crypto')">Crypto Wallet</button>
                <button class="tab" onclick="switchTab('bank')">Bank Transfer</button>
            </div>

            <div id="crypto-section" class="section active">
                <label>Select Network & Currency</label>
                
                <div class="pills-container" id="crypto-pills">
                    <div class="pill active" onclick="updateCrypto('usdt-trc20', this)">
                        <div class="icon-circle">₮</div> USDT (TRC20)
                    </div>
                    <div class="pill" onclick="updateCrypto('usdt-bep20', this)">
                        <div class="icon-circle">₮</div> USDT (BEP20)
                    </div>
                    <div class="pill" onclick="updateCrypto('bnb', this)">
                        <div class="icon-circle">⬡</div> BNB
                    </div>
                    <div class="pill" onclick="updateCrypto('sol', this)">
                        <div class="icon-circle">◎</div> SOL
                    </div>
                    <div class="pill" onclick="updateCrypto('ltc', this)">
                        <div class="icon-circle">Ł</div> LTC
                    </div>
                    <div class="pill" onclick="updateCrypto('doge', this)">
                        <div class="icon-circle">Ð</div> DOGE
                    </div>
                </div>

                <div class="details-box">
                    <div class="details-label">Wallet Address</div>
                    <div class="details-value" id="crypto-address">TEU8aeceAHcr6rFCUV6oUhCSXox6G6xMRi</div>
                </div>
                <button class="copy-btn" onclick="copyCrypto()">Copy Address</button>
            </div>

            <div id="bank-section" class="section">
                <label>Select Fiat Currency</label>
                
                <div class="pills-container" id="bank-pills">
                    <div class="pill active" onclick="updateBank('usd', this)">
                        <div class="icon-circle">$</div> USD
                    </div>
                    <div class="pill" onclick="updateBank('cad', this)">
                        <div class="icon-circle">C$</div> CAD
                    </div>
                    <div class="pill" onclick="updateBank('aud', this)">
                        <div class="icon-circle">A$</div> AUD
                    </div>
                    <div class="pill" onclick="updateBank('eur', this)">
                        <div class="icon-circle">€</div> EUR
                    </div>
                    <div class="pill" onclick="updateBank('gbp', this)">
                        <div class="icon-circle">£</div> GBP
                    </div>
                </div>

                <div class="details-box">
                    <div class="details-row">
                        <div class="details-label">Account Number</div>
                        <div class="details-value" id="bank-account">[Add USD Account Number]</div>
                    </div>
                    <div class="details-row">
                        <div class="details-label">SWIFT Code</div>
                        <div class="details-value" id="bank-swift">[Add USD SWIFT Code]</div>
                    </div>
                </div>
                <button class="copy-btn" onclick="copyBank()">Copy Bank Details</button>
            </div>
        </div>
    </div>

    <script>
        // Store your wallet addresses
        const cryptoData = {
            'usdt-trc20': 'TEU8aeceAHcr6rFCUV6oUhCSXox6G6xMRi',
            'usdt-bep20': '0x3d1957ea8e0a84a16a6e310081fa9e31b93d338f',
            'bnb': '0x3d1957ea8e0a84a16a6e310081fa9e31b93d338f',
            'sol': 'Hi8n3QuGkJfi1eNkPJEqwJRix5WrdGPrKkdyBjosiDXL',
            'ltc': 'ltc1qs4hy6069d5v4755xrapy503jzgystmrdy407mp',
            'doge': 'D6NjMYbPW9EHNADriLtDh1LoccXS2W9wzr'
        };

        // Store your Infinity App international bank details
        const bankData = {
            'usd': { account: '[Add USD Account Number]', swift: '[Add USD SWIFT Code]' },
            'cad': { account: '[Add CAD Account Number]', swift: '[Add CAD SWIFT Code]' },
            'aud': { account: '[Add AUD Account Number]', swift: '[Add AUD SWIFT Code]' },
            'eur': { account: '[Add EUR Account Number]', swift: '[Add EUR SWIFT Code]' },
            'gbp': { account: '[Add GBP Account Number]', swift: '[Add GBP SWIFT Code]' }
        };

        // Switch between Crypto and Bank main tabs
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            
            if(tab === 'crypto') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('crypto-section').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('bank-section').classList.add('active');
            }
        }

        // Update UI when a Crypto Pill is clicked
        function updateCrypto(currencyKey, element) {
            // Remove active state from all crypto pills
            document.querySelectorAll('#crypto-pills .pill').forEach(p => p.classList.remove('active'));
            // Add active state to clicked pill
            element.classList.add('active');
            // Update the address text
            document.getElementById('crypto-address').innerText = cryptoData[currencyKey];
        }

        // Update UI when a Bank Pill is clicked
        function updateBank(currencyKey, element) {
            // Remove active state from all bank pills
            document.querySelectorAll('#bank-pills .pill').forEach(p => p.classList.remove('active'));
            // Add active state to clicked pill
            element.classList.add('active');
            // Update the bank details text
            document.getElementById('bank-account').innerText = bankData[currencyKey].account;
            document.getElementById('bank-swift').innerText = bankData[currencyKey].swift;
        }

        // Copy Crypto Address to Clipboard
        function copyCrypto() {
            const text = document.getElementById('crypto-address').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('#crypto-section .copy-btn');
                btn.innerText = 'Address Copied!';
                setTimeout(() => btn.innerText = 'Copy Address', 2000);
            });
        }

        // Copy Bank Details to Clipboard
        function copyBank() {
            const acc = document.getElementById('bank-account').innerText;
            const swift = document.getElementById('bank-swift').innerText;
            const text = `Account Number: ${acc}\nSWIFT Code: ${swift}`;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('#bank-section .copy-btn');
                btn.innerText = 'Details Copied!';
                setTimeout(() => btn.innerText = 'Copy Bank Details', 2000);
            });
        }
    </script>
</body>
</html>
